<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Platform Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 1.8rem;
            letter-spacing: 0.5px;
            background: -webkit-linear-gradient(#fff, #a1c4fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #b0c4de;
            font-weight: 400;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-group input:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: #00b4db;
            box-shadow: 0 0 15px rgba(0, 180, 219, 0.3);
            transform: scale(1.02);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(0, 180, 219, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 180, 219, 0.5);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.95rem;
            margin-top: 15px;
            display: none;
            font-weight: 400;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Learning Platform</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="alice@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="alice">
            </div>
            <button type="submit" class="login-btn">Sign In</button>
            <div class="error-message" id="errorMsg">Invalid email or password.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            // Password must match the text before @
            const expectedPassword = email.split('@')[0];
            
            if (email && password === expectedPassword) {
                // Success
                document.getElementById('errorMsg').style.display = 'none';
                
                // Store simulated user info in localStorage for the UI
                localStorage.setItem('currentUser', email);
                localStorage.setItem('isLoggedIn', 'true');
                
                // Add a small delay for animation effect, then redirect
                const btn = document.querySelector('.login-btn');
                btn.innerHTML = 'Logging in...';
                btn.style.opacity = '0.8';
                
                setTimeout(() => {
                    // Redirect to the Fiori Elements application
                    window.location.href = '/cnma.learningplatform.cnmalearningplatform/index.html';
                }, 600);
            } else {
                // Error
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'Password must be the text before @ in the email.';
                
                // Shake animation
                const container = document.querySelector('.login-container');
                container.style.animation = 'none';
                // Trigger reflow
                void container.offsetWidth;
                container.style.animation = 'shake 0.4s';
            }
        });

        // Add shake animation dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0% { transform: translateX(0); }
                25% { transform: translateX(-12px); }
                50% { transform: translateX(12px); }
                75% { transform: translateX(-12px); }
                100% { transform: translateX(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
